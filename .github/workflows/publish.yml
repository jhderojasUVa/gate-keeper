name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout full history
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://npm.pkg.github.com

      - name: Install deps
        run: npm ci

      - name: Test
        run: npm test

      - name: Detect release type from conventional commits
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          LAST_TAG="$(git describe --tags --abbrev=0 --match 'v[0-9]*.[0-9]*.[0-9]*' 2>/dev/null || true)"
          RANGE="${LAST_TAG:+${LAST_TAG}..}HEAD"

          # Subject + body, commit-delimited
          LOG="$(git log --format='%s%n%b%n<<<END>>>' "${RANGE}")"

          # Avoid release loops from generated release commits
          FILTERED="$(printf '%s\n' "${LOG}" | awk '
            BEGIN { RS="<<<END>>>\n"; ORS="\n<<<END>>>\n" }
            $0 !~ /^chore\(release\):/ { print }
          ')"

          TYPE="none"
          # Guard: if FILTERED is empty (all commits were chore(release)), keep TYPE=none
          if [ -z "$(echo "${FILTERED}" | tr -d '[:space:]')" ]; then
            TYPE="none"
          elif printf '%s\n' "${FILTERED}" | grep -Eiq '(^[a-z]+\([^)]+\))?!:)|(^|[[:space:]])BREAKING CHANGE:'; then
            TYPE="major"
          elif printf '%s\n' "${FILTERED}" | grep -Eq '^feat(\([^)]+\))?:'; then
            TYPE="minor"
          elif printf '%s\n' "${FILTERED}" | grep -Eq '^(fix|perf|refactor|revert)(\([^)]+\))?:'; then
            TYPE="patch"
          fi

          echo "release_type=${TYPE}" >> "$GITHUB_OUTPUT"
          echo "Detected release_type=${TYPE}"

      - name: Check if last commit is already chore(release)
        if: always()
        run: |
          set -euo pipefail
          LAST_COMMIT="$(git log -1 --format='%s')"
          if [[ "${LAST_COMMIT}" =~ ^chore\(release\): ]]; then
            echo "Last commit is already a chore(release). Skipping release step."
            exit 0
          fi

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run standard-version with selected bump
        if: steps.detect.outputs.release_type != 'none'
        run: npm run release:${{ steps.detect.outputs.release_type }}

      - name: Publish and push release
        if: steps.detect.outputs.release_type != 'none'
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          
          # Only publish to npm if repository matches
          if [ "${GITHUB_REPOSITORY}" = "jhderojasUVa/gate-keeper" ]; then
            npm publish
          fi
          
          # Configure git and push atomically with publish
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push origin main --follow-tags